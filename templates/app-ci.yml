# Template CI for a cardkit-based game app. Copy to <app>/.github/workflows/ci.yml.
name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive   # pulls in the cardkit submodule

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK packages
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Unit tests (engine + ai) and lint
        run: ./gradlew :engine:test :ai:test lint

      - name: Assemble both flavors (debug)
        run: ./gradlew assembleFossDebug assemblePlayDebug

      - name: Verify FOSS build has no proprietary deps
        run: |
          ./gradlew :app:dependencies --configuration fossReleaseRuntimeClasspath > foss-deps.txt
          if grep -Eq 'com\.google\.android\.gms|com\.android\.billingclient|firebase|cardkit-monetization-play' foss-deps.txt; then
            echo "::error::FOSS build graph contains a proprietary dependency"; exit 1
          fi

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write  # create the GitHub release and upload the APK
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - uses: android-actions/setup-android@v3
      - run: sdkmanager "platforms;android-35" "build-tools;35.0.0"
      - uses: gradle/actions/setup-gradle@v4

      # Signing secrets (configure in repo settings):
      #   KEYSTORE_BASE64, KEYSTORE_PASSWORD, KEY_ALIAS, KEY_PASSWORD
      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: echo "$KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/release.jks"

      - name: Build release artifacts
        env:
          KEYSTORE_FILE: ${{ runner.temp }}/release.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew :app:bundlePlayRelease :app:assembleFossRelease

      - name: Publish GitHub release (FOSS APK)
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/foss/release/*.apk
